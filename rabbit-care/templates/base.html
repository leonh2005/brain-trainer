<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 兔子照護系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang TC', '微軟正黑體', sans-serif; background: #fdf6f0; color: #333; }

  nav {
    background: #ff7043;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky; top: 0; z-index: 100;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav .brand { color: white; font-size: 18px; font-weight: bold; padding: 14px 0; margin-right: 8px; white-space: nowrap; flex-shrink: 0; }
  nav a {
    color: rgba(255,255,255,0.85); text-decoration: none;
    padding: 16px 10px; font-size: 14px; transition: all 0.2s;
    white-space: nowrap; flex-shrink: 0;
  }
  nav a:hover, nav a.active { color: white; background: rgba(255,255,255,0.15); }

  .container { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

  .card {
    background: white; border-radius: 14px;
    padding: 24px; margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .card h2 { font-size: 17px; color: #ff7043; margin-bottom: 16px; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 15px; font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: #ff7043;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

  .btn {
    padding: 11px 24px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: #ff7043; color: white; }
  .btn-primary:hover { background: #e64a19; }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 6px; }
  .btn-danger { background: #fff0ee; color: #e53935; border: 1px solid #ffcdd2; }
  .btn-danger:hover { background: #ffcdd2; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; color: #888; font-weight: 600; border-bottom: 2px solid #f0f0f0; }
  td { padding: 12px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .badge-green { background: #e8f5e9; color: #2e7d32; }
  .badge-orange { background: #fff3e0; color: #e65100; }
  .badge-red { background: #ffebee; color: #c62828; }

  .page-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 24px; }
  .text-muted { color: #999; font-size: 13px; }
  .mt-16 { margin-top: 16px; }
</style>
</head>
<body>
<nav>
  <span class="brand">🐰 兔子照護</span>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>首頁</a>
  <a href="/rabbit" {% if request.path == '/rabbit' %}class="active"{% endif %}>基本資料</a>
  <a href="/log" {% if request.path == '/log' %}class="active"{% endif %}>日誌</a>
  <a href="/vet" {% if request.path == '/vet' %}class="active"{% endif %}>就醫紀錄</a>
  <a href="/med" {% if request.path == '/med' %}class="active"{% endif %}>💊 藥物</a>
  <a href="/actions" {% if request.path == '/actions' %}class="active"{% endif %}>🎯 行為紀錄</a>
  <a href="/water" {% if request.path == '/water' %}class="active"{% endif %}>💧 喝水</a>
  <a href="/ai" {% if request.path == '/ai' %}class="active"{% endif %}>🤖 AI 諮詢</a>
  {% if session.get('logged_in') %}
  <a href="/logout" style="margin-left:auto;">登出</a>
  {% else %}
  <a href="/login" style="margin-left:auto;">登入</a>
  {% endif %}
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
