<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 兔子照護系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang TC', '微軟正黑體', sans-serif;
    background: linear-gradient(135deg, #fff3e0, #fbe9e7);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(255,112,67,0.15);
    text-align: center;
  }
  .icon { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 22px; color: #333; margin-bottom: 6px; }
  p { color: #999; font-size: 14px; margin-bottom: 32px; }
  input[type=password] {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 4px;
  }
  input[type=password]:focus { border-color: #ff7043; }
  button {
    width: 100%;
    padding: 14px;
    background: #ff7043;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #e64a19; }
  .error {
    background: #ffebee;
    color: #c62828;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🐰</div>
  <h1>兔子照護系統</h1>
  <p>請輸入密碼進入</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="••••••••" autofocus>
    <button type="submit">進入</button>
  </form>
</div>
</body>
</html>
