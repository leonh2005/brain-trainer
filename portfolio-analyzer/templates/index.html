<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投資組合分析</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e1e4e8; font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px; border-bottom: 1px solid #21262d; background: #161b22;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .updated { font-size: 11px; color: #8b949e; margin-top: 3px; }
    btn { background: #1f6feb; color: #fff; border: none; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button { background: #1f6feb; color: #fff; border: none; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #388bfd; }

    .container { padding: 24px 32px; max-width: 1440px; margin: 0 auto; }

    .cards { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 22px; }
    @media (max-width: 1200px) { .cards { grid-template-columns: repeat(3, 1fr); } }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 18px 20px; }
    .card-label { font-size: 11px; color: #8b949e; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 8px; }
    .card-value { font-size: 22px; font-weight: 700; line-height: 1; }
    .card-sub { font-size: 12px; color: #8b949e; margin-top: 5px; }

    .pos { color: #3fb950; }
    .neg { color: #f85149; }
    .blue { color: #58a6ff; }
    .neutral { color: #e1e4e8; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 22px; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } }

    .section { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 20px; }
    .section-title { font-size: 11px; font-weight: 600; color: #8b949e; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 16px; }

    /* 分頁 */
    .tabs { display: flex; gap: 4px; margin-bottom: 22px; border-bottom: 1px solid #21262d; padding-bottom: 0; }
    .tab { padding: 8px 18px; cursor: pointer; font-size: 13px; color: #8b949e; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; border-radius: 0; }
    .tab:hover { color: #e1e4e8; background: none; }
    .tab.active { color: #58a6ff; border-bottom-color: #1f6feb; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* AI 大師 */
    .masters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 900px) { .masters-grid { grid-template-columns: 1fr; } }
    .master-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 22px; }
    .master-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .master-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
    .master-name { font-size: 14px; font-weight: 600; }
    .master-sub { font-size: 11px; color: #8b949e; }
    .master-body { font-size: 13px; line-height: 1.7; color: #cdd5df; white-space: pre-wrap; }
    .master-error { font-size: 12px; color: #f85149; }
    .ai-loading { text-align: center; padding: 60px; color: #8b949e; }
    .ai-actions { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .ai-actions button { background: #238636; }
    .ai-actions button:hover { background: #2ea043; }
    .ai-note { font-size: 11px; color: #6e7681; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: #8b949e; font-weight: 500; font-size: 11px; padding: 6px 10px; border-bottom: 1px solid #21262d; }
    td { padding: 11px 10px; border-bottom: 1px solid #1c2128; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .ticker { font-weight: 700; font-family: 'SF Mono', monospace; color: #58a6ff; font-size: 13px; }

    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar { height: 4px; background: #1f6feb; border-radius: 2px; min-width: 2px; }

    .chart-wrap { position: relative; height: 260px; }

    .target-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
    .target-row:last-child { border-bottom: none; }

    .loading { text-align: center; padding: 60px; color: #8b949e; font-size: 14px; }
    .err { color: #f85149; text-align: center; padding: 40px; }

    .rate-note { text-align: right; color: #6e7681; font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>投資組合分析</h1>
      <div class="updated" id="ts">載入中...</div>
    </div>
    <button onclick="doRefresh()">↻ 重新整理</button>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('portfolio', this)">投資組合</button>
      <button class="tab" onclick="switchTab('ai', this)">AI 大師分析</button>
      <button class="tab" onclick="switchTab('dcf', this)">DCF 估值</button>
    </div>
    <div id="tab-portfolio" class="tab-content active">
      <div id="app"><div class="loading">資料載入中，請稍候...</div></div>
    </div>
    <div id="tab-ai" class="tab-content">
      <div class="ai-actions">
        <button onclick="loadAI(false)">▶ 執行分析</button>
        <button onclick="loadAI(true)" style="background:#6e3b9c">↻ 重新分析</button>
        <span class="ai-note">每次分析約需 30 秒，結果快取 1 小時</span>
      </div>
      <div id="ai-content"><div class="ai-loading">點擊「執行分析」讓四位大師評論你的投資組合</div></div>
    </div>
    <div id="tab-dcf" class="tab-content">
      <div class="ai-actions">
        <button onclick="loadDCF(false)">▶ 執行估值</button>
        <button onclick="loadDCF(true)" style="background:#6e3b9c">↻ 重新抓取</button>
        <span class="ai-note">自動抓取財報資料，ETF/債券不計算 DCF｜折現率 10%，永續成長 3%</span>
      </div>
      <div id="dcf-content"><div class="ai-loading">點擊「執行估值」開始 DCF 分析</div></div>
    </div>
  </div>

  <script>
    let pie = null;

    function switchTab(name, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      el.classList.add('active');
    }

    const MASTER_COLORS = { buffett: '#f0a500', lynch: '#3fb950', graham: '#58a6ff', dalio: '#e57c5b' };
    const MASTER_INITIALS = { buffett: 'WB', lynch: 'PL', graham: 'BG', dalio: 'RD' };

    async function loadDCF(refresh = false) {
      document.getElementById('dcf-content').innerHTML = '<div class="ai-loading">抓取財報資料中...</div>';
      try {
        const url = refresh ? '/api/dcf?refresh=1' : '/api/dcf';
        const r = await fetch(url);
        const j = await r.json();
        if (!j.ok) throw new Error(j.error);
        renderDCF(j.data);
      } catch(e) {
        document.getElementById('dcf-content').innerHTML = `<div class="err">估值失敗：${e.message}</div>`;
      }
    }

    function renderDCF(items) {
      const rows = items.map(item => {
        if (item.type === 'ETF/債券') {
          return `<tr>
            <td class="ticker">${item.ticker.replace('.TW','').replace('.TWO','')}</td>
            <td>${item.name}</td>
            <td style="color:#8b949e">ETF/債券</td>
            <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>
            <td><span style="color:#8b949e">—</span></td>
          </tr>`;
        }
        if (item.error) {
          return `<tr>
            <td class="ticker">${item.ticker.replace('.TW','')}</td>
            <td>${item.name}</td><td>股票</td>
            <td colspan="5" style="color:#f85149;font-size:12px">${item.error}</td>
            <td>—</td>
          </tr>`;
        }
        const upsideColor = item.upside > 20 ? '#3fb950' : item.upside < -20 ? '#f85149' : '#e1e4e8';
        const verdictColor = item.verdict.includes('低估') ? '#3fb950' : item.verdict.includes('高估') ? '#f85149' : '#ffa657';
        return `<tr>
          <td class="ticker">${item.ticker.replace('.TW','').replace('.TWO','')}</td>
          <td>${item.name}</td>
          <td style="color:#8b949e">股票</td>
          <td>${item.price ?? '—'}</td>
          <td style="color:#58a6ff;font-weight:600">${item.dcf ?? '—'}</td>
          <td style="color:${upsideColor}">${item.upside != null ? (item.upside > 0 ? '+' : '') + item.upside + '%' : '—'}</td>
          <td>${item.eps ?? '—'}</td>
          <td>${item.growth != null ? item.growth + '%' : '—'}</td>
          <td><span style="color:${verdictColor};font-weight:600">${item.verdict}</span></td>
        </tr>`;
      }).join('');

      document.getElementById('dcf-content').innerHTML = `
        <div class="section">
          <div class="section-title">DCF 內在價值估算（兩段式，折現率 10%）</div>
          <table>
            <thead>
              <tr>
                <th>代號</th><th>名稱</th><th>類型</th>
                <th>現價</th><th>DCF 價值</th><th>上漲空間</th>
                <th>EPS</th><th>預估成長</th><th>判斷</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="rate-note" style="margin-top:12px">⚠️ DCF 僅供參考，成長率來自 Yahoo Finance 分析師預估，實際結果可能偏差</div>
        </div>`;
    }

    async function loadAI(refresh = false) {
      document.getElementById('ai-content').innerHTML = '<div class="ai-loading">分析中，請稍候約 30 秒...</div>';
      try {
        const url = refresh ? '/api/ai-analysis?refresh=1' : '/api/ai-analysis';
        const r = await fetch(url);
        const j = await r.json();
        if (!j.ok) throw new Error(j.error);
        renderAI(j.data);
      } catch(e) {
        document.getElementById('ai-content').innerHTML = `<div class="err">分析失敗：${e.message}</div>`;
      }
    }

    function renderAI(data) {
      const order = ['buffett', 'lynch', 'graham', 'dalio'];
      const html = `<div class="masters-grid">${order.map(key => {
        const m = data[key];
        const color = MASTER_COLORS[key];
        const initials = MASTER_INITIALS[key];
        return `
          <div class="master-card">
            <div class="master-header">
              <div class="master-avatar" style="background:${color}22;color:${color}">${initials}</div>
              <div>
                <div class="master-name">${m.title} <span style="color:#8b949e;font-size:11px">${m.name}</span></div>
              </div>
            </div>
            ${m.error
              ? `<div class="master-error">分析失敗：${m.error}</div>`
              : `<div class="master-body">${m.analysis}</div>`
            }
          </div>`;
      }).join('')}</div>`;
      document.getElementById('ai-content').innerHTML = html;
    }

    const fmt  = n => Math.round(n).toLocaleString('zh-TW');
    const pct  = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    const cls  = n => n >= 0 ? 'pos' : 'neg';
    const COLORS = ['#1f6feb','#388bfd','#58a6ff','#79c0ff','#3fb950','#56d364','#ffa657','#f85149','#d29922','#8957e5'];

    async function load(refresh = false) {
      const r = await fetch(refresh ? '/api/refresh' : '/api/data');
      const j = await r.json();
      if (!j.ok) throw new Error(j.error);
      return j.data;
    }

    function render(d) {
      const m = d.metrics;
      const p = d.positions;

      document.getElementById('ts').textContent = '更新：' + d.updated_at;

      const sharpeColor = m.sharpe >= 1 ? 'pos' : m.sharpe >= 0 ? 'blue' : 'neg';

      document.getElementById('app').innerHTML = `
        <div class="cards">
          <div class="card">
            <div class="card-label">總市值（台幣）</div>
            <div class="card-value neutral">NT$${fmt(d.total_twd)}</div>
            <div class="card-sub">≈ US$${fmt(d.total_usd)}</div>
          </div>
          <div class="card">
            <div class="card-label">年化報酬</div>
            <div class="card-value ${cls(m.annual_return)}">${pct(m.annual_return)}</div>
            <div class="card-sub">歷史1年</div>
          </div>
          <div class="card">
            <div class="card-label">年化波動</div>
            <div class="card-value neutral">${pct(m.annual_vol)}</div>
            <div class="card-sub">標準差</div>
          </div>
          <div class="card">
            <div class="card-label">Sharpe Ratio</div>
            <div class="card-value ${sharpeColor}">${m.sharpe.toFixed(2)}</div>
            <div class="card-sub">> 1 為佳</div>
          </div>
          <div class="card">
            <div class="card-label">VaR 95%（日）</div>
            <div class="card-value neg">${m.var_95.toFixed(2)}%</div>
            <div class="card-sub">≈ NT$${fmt(Math.abs(m.var_95 / 100 * d.total_twd))}</div>
          </div>
          <div class="card">
            <div class="card-label">最大回撤</div>
            <div class="card-value neg">${m.max_drawdown.toFixed(2)}%</div>
            <div class="card-sub">歷史最大</div>
          </div>
        </div>

        <div class="section" style="margin-bottom:22px">
          <div class="section-title">持倉明細</div>
          <table>
            <thead>
              <tr>
                <th>代號</th><th>名稱</th><th>股數／單位</th>
                <th>現價</th><th>市值（台幣）</th><th>佔比</th>
              </tr>
            </thead>
            <tbody>
              ${p.map(pos => `
                <tr>
                  <td class="ticker">${pos.ticker.replace('.TW','').replace('.L','')}</td>
                  <td>${pos.name}</td>
                  <td>${fmt(pos.shares)}</td>
                  <td>${pos.currency === 'USD' ? 'US$' : 'NT$'}${pos.price.toFixed(2)}</td>
                  <td>NT$${fmt(pos.value_twd)}</td>
                  <td>
                    <div class="bar-wrap">
                      <span>${pos.weight.toFixed(1)}%</span>
                      <div class="bar" style="width:${Math.min(pos.weight * 3, 80)}px"></div>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="row">
          <div class="section">
            <div class="section-title">現有配置</div>
            <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
          </div>
          <div class="section">
            <div class="section-title">目標配置</div>
            ${d.target.map(t => `
              <div class="target-row">
                <span class="ticker">${t.ticker.replace('.TW','').replace('.L','')}</span>
                <span style="color:#8b949e;font-size:12px">${t.name}</span>
                <span class="blue" style="font-weight:600">${(t.target_pct * 100).toFixed(0)}%</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="rate-note">USD/TWD：${d.usdtwd} ｜ 資料來源：Yahoo Finance</div>
      `;

      // 畫圓餅圖
      if (pie) pie.destroy();
      pie = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: {
          labels: p.map(x => x.ticker.replace('.TW','').replace('.L','')),
          datasets: [{
            data: p.map(x => x.value_twd),
            backgroundColor: COLORS.slice(0, p.length),
            borderWidth: 2, borderColor: '#161b22'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 12 } },
            tooltip: { callbacks: { label: c => ` NT$${fmt(c.raw)} (${(c.raw/d.total_twd*100).toFixed(1)}%)` } }
          }
        }
      });
    }

    async function doRefresh() {
      document.getElementById('app').innerHTML = '<div class="loading">重新整理中...</div>';
      try { render(await load(true)); }
      catch(e) { document.getElementById('app').innerHTML = `<div class="err">錯誤：${e.message}</div>`; }
    }

    (async () => {
      try { render(await load()); }
      catch(e) { document.getElementById('app').innerHTML = `<div class="err">載入失敗：${e.message}</div>`; }
    })();
  </script>
</body>
</html>
