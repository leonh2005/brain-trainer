<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>當沖回放模擬</title>
<script src="/static/lightweight-charts.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'SF Pro Display', 'Helvetica Neue', sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── 頂部控制列 ── */
  #toolbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 7px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #toolbar h1 { font-size: 14px; font-weight: 600; color: #58a6ff; margin-right: 6px; white-space: nowrap; }
  select {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: #58a6ff; }
  .btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn:hover { background: #30363d; }
  .btn.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
  .btn:disabled { opacity: .35; cursor: default; }
  #speed-group { display: flex; gap: 4px; }
  #status-bar { margin-left: auto; font-size: 12px; color: #8b949e; white-space: nowrap; }
  #current-time { font-size: 14px; font-weight: 700; color: #f0883e; min-width: 52px; }

  /* ── 指標工具列 ── */
  #indicator-bar {
    background: #0d1117;
    border-bottom: 1px solid #21262d;
    padding: 4px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .ind-label { font-size: 10px; color: #8b949e; letter-spacing: .04em; margin-right: 2px; }
  .ind-sep { width: 1px; height: 16px; background: #30363d; margin: 0 4px; }
  .ind-btn {
    background: #161b22;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    transition: all .15s;
  }
  .ind-btn:hover { border-color: #8b949e; color: #e6edf3; }
  .ind-btn.active { border-color: #58a6ff; color: #58a6ff; background: rgba(31,111,235,.12); }
  /* 均線各自顏色 */
  #ind-ma5.active  { border-color: #f0883e; color: #f0883e; background: rgba(240,136,62,.1); }
  #ind-ma10.active { border-color: #58a6ff; color: #58a6ff; background: rgba(88,166,255,.1); }
  #ind-ma20.active { border-color: #bc8cff; color: #bc8cff; background: rgba(188,140,255,.1); }

  /* ── 主區域 ── */
  #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* ── 圖表區（flex-column）── */
  #chart-area {
    flex: 1;
    position: relative;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #chart { flex: 1; min-height: 180px; }

  /* ── 副圖共用 ── */
  .sub-chart {
    flex-shrink: 0;
    border-top: 1px solid #21262d;
  }
  #vol-chart  { height: 80px; position: relative; }
  #vol-tooltip {
    position: absolute;
    background: rgba(22,27,34,.92);
    border: 1px solid #484f58;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 600;
    color: #e6edf3;
    pointer-events: none;
    display: none;
    z-index: 20;
    white-space: nowrap;
  }
  #macd-chart { height: 100px; }
  #rsi-chart  { height: 100px; }
  #obv-chart  { height: 100px; }

  /* ── 右側面板 ── */
  #panel {
    width: 220px;
    background: #161b22;
    border-left: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .panel-section {
    border-bottom: 1px solid #30363d;
    padding: 10px 12px;
  }
  .panel-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #8b949e;
    margin-bottom: 8px;
  }

  /* ── 訊號燈 ── */
  #signals-list { display: flex; flex-direction: column; gap: 5px; }
  .signal-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    border-radius: 4px;
    transition: background .1s;
  }
  .signal-row.triggered { background: rgba(35,134,54,.15); }
  .signal-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #30363d;
    flex-shrink: 0;
    transition: background .2s, box-shadow .2s;
  }
  .signal-dot.on  { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
  .signal-dot.na  { background: #d29922; }
  .signal-label   { font-size: 12px; color: #8b949e; }
  .signal-row.triggered .signal-label { color: #e6edf3; }

  /* ── 信心度 ── */
  #confidence-bar-wrap {
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 6px;
  }
  #confidence-bar {
    height: 100%;
    background: linear-gradient(90deg, #1f6feb, #3fb950);
    border-radius: 3px;
    width: 0%;
    transition: width .3s;
  }
  #confidence-text { font-size: 20px; font-weight: 700; color: #e6edf3; }
  #trigger-badge {
    display: none;
    background: #f85149;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 4px;
    text-align: center;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── 持倉 ── */
  #position-price { font-size: 15px; font-weight: 700; color: #e6edf3; }
  #position-pnl   { font-size: 20px; font-weight: 700; margin-top: 2px; }
  #position-ntd   { font-size: 13px; font-weight: 600; margin-top: 1px; }
  .pos-up   { color: #f85149; }
  .pos-down { color: #3fb950; }
  .pos-flat { color: #8b949e; }

  /* 張數控制 */
  .lot-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .lot-label { font-size: 12px; color: #8b949e; }
  .lot-ctrl { display: flex; align-items: center; gap: 6px; }
  .lot-btn {
    width: 22px; height: 22px; border-radius: 4px;
    background: #30363d; border: 1px solid #484f58;
    color: #e6edf3; font-size: 14px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .lot-btn:hover { background: #484f58; }
  #lot-display { font-size: 14px; font-weight: 700; color: #e6edf3; min-width: 20px; text-align: center; }
  #capital-required { font-size: 11px; color: #8b949e; margin-bottom: 6px; }

  #buy-btn, #sell-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  #buy-btn  { background: #f85149; color: #fff; }
  #sell-btn { background: #3fb950; color: #fff; }
  #buy-btn:disabled, #sell-btn:disabled { opacity: .35; cursor: default; }
  .trade-btns { display: flex; gap: 8px; margin-top: 8px; }

  /* 當前持倉張數 */
  #holding-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  #holding-label { font-size:12px; color:#8b949e; }
  #holding-lots { font-size:18px; font-weight:700; color:#8b949e; }

  /* 確認 modal */
  #confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.6); z-index: 999;
    align-items: center; justify-content: center;
  }
  #confirm-box {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 10px; padding: 20px 24px; min-width: 220px; text-align: center;
  }
  #confirm-msg { font-size: 15px; font-weight: 700; color: #e6edf3; margin-bottom: 16px; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  #confirm-yes { background: #238636; color:#fff; border:none; border-radius:6px; padding:8px 22px; font-size:14px; font-weight:700; cursor:pointer; }
  #confirm-no  { background: #30363d; color:#cdd9e5; border:none; border-radius:6px; padding:8px 22px; font-size:14px; font-weight:700; cursor:pointer; }

  /* ── 交易紀錄 ── */
  #trades-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    min-height: 0;
  }
  #trades-list h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #8b949e;
    margin-bottom: 8px;
  }
  .trade-item {
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 1px solid #21262d;
    color: #8b949e;
    line-height: 1.5;
  }
  .trade-item .pnl { font-weight: 700; }
  .trade-item .pnl.up   { color: #f85149; }
  .trade-item .pnl.down { color: #3fb950; }
  #total-pnl-row { font-size: 12px; color: #8b949e; margin-top: 6px; }
  #total-pnl-val { font-weight: 700; font-size: 13px; }
  #total-ntd-val { font-weight: 700; font-size: 12px; }

  /* ── 載入遮罩 ── */
  #loading {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(13,17,23,.85);
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #58a6ff;
    z-index: 100;
  }
  #loading.show { display: flex; }
</style>
</head>
<body>

<!-- 頂部控制列 -->
<div id="toolbar">
  <h1>⚡ 當沖回放</h1>
  <select id="stock-select"><option value="">載入中...</option></select>
  <select id="date-select"><option value="">選股票</option></select>
  <div id="speed-group">
    <button class="btn" onclick="setSpeed(0.5)" id="s0_5">0.5x</button>
    <button class="btn active" onclick="setSpeed(1)" id="s1">1x</button>
    <button class="btn" onclick="setSpeed(3)" id="s3">3x</button>
    <button class="btn" onclick="setSpeed(10)" id="s10">10x</button>
    <button class="btn" onclick="setSpeed(30)" id="s30">30x</button>
  </div>
  <button class="btn" id="play-btn" onclick="togglePlay()" disabled>▶ 播放</button>
  <button class="btn" onclick="rewindOneBar()" id="rewind-btn" disabled title="退一根K棒">◀ 1分</button>
  <button class="btn" onclick="resetReplay()" id="reset-btn" disabled>⏮ 重置</button>
  <span id="current-time">--:--</span>
  <span id="status-bar">請選擇股票和日期</span>
</div>

<!-- 指標工具列 -->
<div id="indicator-bar">
  <span class="ind-label">均線</span>
  <button class="ind-btn active" id="ind-ma5"  onclick="toggleMA(5)">MA5</button>
  <button class="ind-btn active" id="ind-ma10" onclick="toggleMA(10)">MA10</button>
  <button class="ind-btn active" id="ind-ma20" onclick="toggleMA(20)">MA20</button>
  <div class="ind-sep"></div>
  <span class="ind-label">參考線</span>
  <button class="ind-btn" id="ind-pivot" onclick="togglePivot()">三關價</button>
  <button class="ind-btn" id="ind-cdp"   onclick="toggleCDP()">CDP</button>
  <div class="ind-sep"></div>
  <span class="ind-label">副圖</span>
  <button class="ind-btn active" id="ind-vol"  onclick="togglePanel('vol')">成交量</button>
  <button class="ind-btn active" id="ind-macd" onclick="togglePanel('macd')">MACD</button>
  <button class="ind-btn active" id="ind-rsi"  onclick="togglePanel('rsi')">RSI</button>
  <button class="ind-btn active" id="ind-obv"  onclick="togglePanel('obv')">OBV</button>
  <div class="ind-sep"></div>
  <div id="index-info" style="display:flex;gap:12px;margin-left:auto;align-items:center">
    <span id="pos-display" style="font-size:11px;color:#8b949e;white-space:nowrap">持倉 —</span>
    <span style="color:#30363d">|</span>
    <span id="stock-display" style="font-size:11px;color:#8b949e;white-space:nowrap">個股 —</span>
    <span id="taiex-display" style="font-size:11px;color:#8b949e;white-space:nowrap">大盤 —</span>
    <span id="sector-display" style="font-size:11px;color:#8b949e;white-space:nowrap">產業 —</span>
  </div>
</div>

<!-- 主區域 -->
<div id="main">
  <!-- 圖表區 -->
  <div id="chart-area">
    <div id="chart"></div>
    <div id="vol-chart"  class="sub-chart"></div>
    <div id="macd-chart" class="sub-chart"></div>
    <div id="rsi-chart"  class="sub-chart"></div>
    <div id="obv-chart"  class="sub-chart"></div>
    <div id="loading"><span>載入資料中...</span></div>
  </div>

  <!-- 右側面板 -->
  <div id="panel">

    <!-- 訊號燈 -->
    <div class="panel-section" style="flex-shrink:0">
      <h3>策略訊號</h3>
      <div id="signals-list"></div>
    </div>

    <!-- 信心度 -->
    <div class="panel-section" style="flex-shrink:0">
      <h3>信心度</h3>
      <div id="confidence-text">0%</div>
      <div id="confidence-bar-wrap"><div id="confidence-bar"></div></div>
      <div id="trigger-badge">⚡ 訊號觸發！</div>
    </div>

    <!-- 持倉 & 交易 -->
    <div class="panel-section" style="flex-shrink:0">
      <h3>持倉</h3>
      <div class="lot-row">
        <span class="lot-label">張數</span>
        <div class="lot-ctrl">
          <button class="lot-btn" onclick="changeLots(-1)">−</button>
          <span id="lot-display">1</span>
          <button class="lot-btn" onclick="changeLots(1)">+</button>
        </div>
      </div>
      <div id="capital-required">所需資金：—</div>
      <div id="holding-row">
        <span id="holding-label">當前持倉</span>
        <span id="holding-lots">0 張</span>
      </div>
      <div id="position-price">無持倉</div>
      <div id="position-pnl" class="pos-flat">—</div>
      <div id="position-ntd" class="pos-flat"></div>
      <div class="trade-btns">
        <button id="buy-btn"  onclick="buy()"  disabled>買進 ▲</button>
        <button id="sell-btn" onclick="sell()" disabled>賣出 ▼</button>
      </div>
      <div id="total-pnl-row">
        累計損益：<span id="total-pnl-val" class="pos-flat">0.00%</span>
        ／<span id="total-ntd-val" class="pos-flat">$0</span>
      </div>
    </div>

    <!-- 交易紀錄 -->
    <div id="trades-list">
      <h3>交易紀錄</h3>
      <div id="trades-content"><div style="color:#8b949e;font-size:12px">尚無交易</div></div>
    </div>

  </div>
</div>

<script src="/static/app.js"></script>

<div id="confirm-overlay" onclick="confirmNo()">
  <div id="confirm-box" onclick="event.stopPropagation()">
    <div id="confirm-msg"></div>
    <div class="confirm-btns">
      <button id="confirm-yes" onclick="confirmYes()">✓ 確認</button>
      <button id="confirm-no"  onclick="confirmNo()">✗ 取消</button>
    </div>
  </div>
</div>
</body>
</html>
