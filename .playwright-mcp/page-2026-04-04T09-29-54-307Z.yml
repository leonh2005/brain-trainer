              - paragraph [ref=e454]: Options are contracts that give investors the right to buy or sell stocks, indexes or other financial securities at an agreed upon price and date. Puts are the option to sell while calls are the option to buy. When the ratio of puts to calls is rising, it is usually a sign investors are growing more nervous. A ratio above 1 is considered bearish. The Fear & Greed Index uses a bearish options ratio as a signal for Fear.
