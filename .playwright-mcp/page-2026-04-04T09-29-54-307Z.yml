                - generic [ref=e587]:
                  - paragraph [ref=e588]: "Note: The frequent drops of the yield spread on the Junk Bond Demand chart usually appear on the ex-dividend date. The spread typically bounces back after the dividend is paid and normalizes over time."
                  - generic [ref=e589]:
                    - paragraph [ref=e590]: Last updated Apr 2 at 8:00:00 PM EDT
                    - paragraph
              - paragraph [ref=e592]: Junk bonds carry a higher risk of default compared to other bonds. Bond yields – or the return you get on investing in a bond - dip when prices go up. If investors crave junk bonds, the yields drop. Likewise, yields rise when people are selling. So a smaller difference (or spread) between yields for junk bonds and safer government bonds is a sign investors are taking on more risk. A wider spread shows more caution. The Fear & Greed Index uses junk bond demand as a signal for Greed.
          - generic [ref=e593]:
            - heading "FEAR & GREED INDEX FAQs" [level=4] [ref=e595]
            - paragraph [ref=e596]: What is the CNN Business Fear & Greed Index?
            - paragraph [ref=e597]: The Fear & Greed Index is a way to gauge stock market movements and whether stocks are fairly priced. The theory is based on the logic that excessive fear tends to drive down share prices, and too much greed tends to have the opposite effect.
            - paragraph [ref=e598]: How is Fear & Greed Calculated?
            - paragraph [ref=e599]: The Fear & Greed Index is a compilation of seven different indicators that measure some aspect of stock market behavior. They are market momentum, stock price strength, stock price breadth, put and call options, junk bond demand, market volatility, and safe haven demand. The index tracks how much these individual indicators deviate from their averages compared to how much they normally diverge. The index gives each indicator equal weighting in calculating a score from 0 to 100, with 100 representing maximum greediness and 0 signaling maximum fear.
            - paragraph [ref=e600]: How often is the Fear & Greed Index calculated?
            - paragraph [ref=e601]: Every component and the Index are calculated as soon as new data becomes available.
            - paragraph [ref=e602]: How to use Fear & Greed Index?
            - paragraph [ref=e603]: The Fear & Greed Index is used to gauge the mood of the market. Many investors are emotional and reactionary, and fear and greed sentiment indicators can alert investors to their own emotions and biases that can influence their decisions. When combined with fundamentals and other analytical tools, the Index can be a helpful way to assess market sentiment.
            - link "Return to Fear & Greed Index" [ref=e604] [cursor=pointer]:
