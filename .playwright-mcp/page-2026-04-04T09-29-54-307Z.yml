              - paragraph [ref=e372]: A few big stocks can skew returns for the market. It’s important to also know how many stocks are doing well versus those that are struggling. This shows the number of stocks on the NYSE at 52-week highs compared to those at 52-week lows. When there are many more highs than lows, that’s a bullish sign and signals Greed.
