                  - text: 且經您事先同意始提供之商品或服務。例如：電子書、虛擬點數或電子會員卡等。
                  - text: 6.已拆封之個人衛生用品，例如：已拆封之內衣褲或刮鬍刀。若您不確定是否辦理退貨，請勿拆封。
