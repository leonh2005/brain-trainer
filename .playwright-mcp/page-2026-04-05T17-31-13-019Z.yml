                  - text: ※取消訂單/退貨時，您與本店鋪應互負回復原狀之責，故商品應為全新狀態
                  - text: （需回復至商品到貨時之狀態），並保持完整包裝
                  - text: （包括主要商品、週邊相關配件、保證書、附隨文件、贈品或發票等，以及原包裝、外盒），
