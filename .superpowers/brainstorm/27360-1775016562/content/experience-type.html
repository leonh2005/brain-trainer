<h2>這個網站的核心體驗是什麼？</h2>
<p class="subtitle">你希望使用者進來後，主要做什麼？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>互動式引導工具</h3>
      <p>像一個數位教練，一步一步帶著使用者走完整個一日流程。早晨→白天→晚上，每個階段有輸入框、反思題、計時器。完成後可以儲存或匯出今日的重啟紀錄。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>精美的方法論展示頁</h3>
      <p>像一篇視覺化的長文，把 Dan Koe 的方法拆解成圖文並茂的章節。使用者自己閱讀、思考，不一定要在網站上輸入內容。重點在傳達概念，而非互動。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>個人反思日誌系統</h3>
      <p>每次打開都是一個新的「一日重啟」記錄。有願景板、目標欄、每日反省。可以儲存多次紀錄，追蹤自己隨時間的改變與成長。</p>
    </div>
  </div>
</div>
